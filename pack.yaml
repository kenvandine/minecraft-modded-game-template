# ─────────────────────────────────────────────────────────────────────────────
# Pack configuration — edit this file to define your modded Minecraft experience
# Full reference: https://github.com/kenvandine/minecraft-server-snap/blob/main/docs/pack-yaml-reference.md
# ─────────────────────────────────────────────────────────────────────────────

# Display name shown in the launcher window and GitHub release title
name: "Kaden's Minecraft World"

# Modpack version — bump this with each release (independent of Minecraft version)
version: "0.0.1"

# Target Minecraft Java Edition version
minecraft_version: "1.21.1"

# Mod loader — only "fabric" is supported
mod_loader: fabric

# Fabric loader version — "latest" resolves automatically at build time
# Pin to a specific version (e.g. "0.16.9") for reproducible builds
mod_loader_version: "latest"

# Fabric installer version — used to generate the server JAR
installer_version: "latest"

# ─── Microsoft authentication ──────────────────────────────────────────────
# Required for online play. Do NOT put your client ID here — set it as a
# GitHub Actions secret named AZURE_CLIENT_ID instead. It will be injected
# at build time and kept out of version control.
# Setup guide: https://github.com/kenvandine/minecraft-server-snap/blob/main/docs/azure-setup.md
# If the secret is not set, the launcher will use offline mode only.

# ─── Launcher appearance ───────────────────────────────────────────────────
# Background color for the launcher hero panel (CSS hex color)
background_color: "#0d1117"

# ─── Java memory settings ──────────────────────────────────────────────────
# Passed to the JVM when launching Minecraft
# Increase Xmx for heavier modpacks (50+ mods typically need 6G+)
java_args: "-Xms2G -Xmx4G"

# ─── Mods ──────────────────────────────────────────────────────────────────
# side: both   → included in server AND client artifacts (most mods)
# side: server → server artifact only (e.g. profiling, anti-cheat utilities)
# side: client → client artifact only (e.g. Sodium, Iris, UI mods)
#
# URL tips:
#   Modrinth: open mod page → Versions → right-click download → Copy link address
#   Use permanent CDN URLs (modrinth CDN URLs are stable per version)
mods:
  # Fabric API is required by almost all Fabric mods
  - name: "Fabric API"
    url: "https://cdn.modrinth.com/data/P7dR8mSH/versions/yGAe1owa/fabric-api-0.116.9%2B1.21.1.jar"
    side: both

  # Sodium — client-side rendering optimization (not needed on server)
  - name: "Sodium"
    url: "https://cdn.modrinth.com/data/AANobbMI/versions/u1OEbNKx/sodium-fabric-0.6.13%2Bmc1.21.1.jar"
    side: client

  # Lithium — server and client logic optimization
  - name: "Lithium"
    url: "https://cdn.modrinth.com/data/gvQqBUqZ/versions/XQJtuOTA/lithium-fabric-0.15.3%2Bmc1.21.1.jar"
    side: both

  # Add more mods below following the same pattern:
  # - name: "Mod Name"
  #   url: "https://cdn.modrinth.com/..."
  #   side: both
